# TeraSim ghost replay config with sumo-gui enabled.
#
# Requires X11 forwarding in the Docker container:
#   xhost +local:docker   (run once on the host)
#   docker run -e DISPLAY=$DISPLAY -v /tmp/.X11-unix:/tmp/.X11-unix ...
#
# gui_flag: true  → simulator uses the sumo-gui binary; a native window
# opens on the host desktop.  Simulation advances only when the bridge fires
# a tick, so the visual update rate matches --step_delay in the validate script.
#
# fcd_all is always enabled so the FCD file is available for offline replay
# regardless of whether --gui was used.

seed: 42

input:
  sumo_net_file: "/sim_config/maps/shinagawa_odaiba.net.xml"
  sumo_config_file: "/sim_config/sim.sumocfg"

environment:
  module: "terasim_nde_nade.envs"
  class: "NADEWithAV"
  parameters:
    log_flag: false
    warmup_time_lb: 0
    warmup_time_ub: 1
    run_time: 99999
    MOBIL_lc_flag: true
    stochastic_acc_flag: false
    drive_rule: "lefthand"
    av_debug_control: false
    AV_cfg:
      type: "veh_AV"
      cache_radius: 150
      control_radius: 50
      route:
        - "ll_190615"
      warmup_control:
        enabled: false

simulator:
  parameters:
    num_tries: 10
    gui_flag: true
    realtime_flag: false
    sumo_seed: 42
    traffic_scale: 1.0
    sumo_output_file_types:
      - "collision"
      - "fcd_all"

output:
  dir: "/tmp/terasim_output"
  name: "ghost_replay"
  nth: "0"
  aggregated_dir: "aggregated"

logging:
  levels:
    - "INFO"
